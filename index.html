<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/src/assets/favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="transparent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="SukiStudy" />
    <link rel="apple-touch-icon" href="/src/assets/apple-touch-icon.png" />
    <title>SukiStudy</title>
    <meta property="description" content="A Japanese learning companion using WaniKani." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sukistudy.vercel.app/" />
    <meta property="og:title" content="SukiStudy" />
    <meta property="og:description" content="A Japanese learning companion using WaniKani." />
    <meta property="og:image" content="https://sukistudy.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://sukistudy.vercel.app/" />
    <meta property="twitter:title" content="SukiStudy" />
    <meta property="twitter:description" content="A Japanese learning companion using WaniKani." />
    <meta property="twitter:image" content="https://sukistudy.vercel.app/og-image.png" />

    <style>
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    <!--
      Initial splash screen. Lives in index.html (not React) so it paints
      instantly when the app opens, before the JS bundle loads. It holds until
      the app signals readiness via window.__sukiSplashFinish() (called once the
      databases have initialized), then the red ring finishes expanding outward
      and the whole layer fades to reveal the app.
    -->
    <style id="suki-splash-style">
      :root {
        --suki-red: #ff0000;
      }

      /* Only applied while the app is booting behind the splash (never on the
         landing/login pages). Locks scroll so no scrollbar exists — a scrollbar
         would shift the centered fixed ring sideways — and paints dark to avoid
         a white flash before the app's dark theme applies. */
      html.suki-booting {
        background-color: #0a0a0c;
      }
      html.suki-booting,
      html.suki-booting body {
        overflow: hidden;
      }

      #suki-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #16161d 0%, #0a0a0c 58%, #060608 100%);
        opacity: 1;
        transition: opacity 0.7s ease 0.1s;
        will-change: opacity;
      }

      /* Ring + logo are centered with translate(); the standalone `scale`
         property composes on top of it, so it animates without fighting the
         centering transform. (auto margins mis-center boxes wider than the
         viewport, so translate is used instead.) */
      #suki-splash .suki-splash__ring {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 108vmax;
        height: 108vmax;
        border-radius: 50%;
        border: 3px solid var(--suki-red);
        box-shadow:
          0 0 24px rgba(255, 0, 0, 0.5),
          inset 0 0 24px rgba(255, 0, 0, 0.32);
        opacity: 0;
        scale: 0.13;
        transition:
          scale 1s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.6s ease;
        will-change: scale, opacity;
      }

      #suki-splash .suki-splash__logo {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 92px;
        height: 92px;
        object-fit: contain;
        border-radius: 22%;
        opacity: 0;
        scale: 0.6;
        filter: drop-shadow(0 10px 34px rgba(255, 0, 0, 0.35));
        transition:
          scale 0.7s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.6s ease;
        will-change: scale, opacity;
      }

      /* Entry: ring expands out to rest against the screen edges, logo settles. */
      #suki-splash.suki-splash--enter .suki-splash__ring {
        opacity: 1;
        scale: 1;
        animation: suki-ring-breathe 3.2s ease-in-out 1.1s infinite;
      }
      #suki-splash.suki-splash--enter .suki-splash__logo {
        opacity: 1;
        scale: 1;
      }

      /* Exit: ring finishes expanding past the edges while everything fades. */
      #suki-splash.suki-splash--done {
        opacity: 0;
        pointer-events: none;
      }
      #suki-splash.suki-splash--done .suki-splash__ring {
        scale: 2.8;
        opacity: 0;
        animation: none;
        transition:
          scale 0.9s cubic-bezier(0.4, 0, 0.9, 1),
          opacity 0.7s ease 0.15s;
      }
      #suki-splash.suki-splash--done .suki-splash__logo {
        scale: 1.18;
        opacity: 0;
      }

      /* Gentle glow while holding — box-shadow only, so it never fights scale. */
      @keyframes suki-ring-breathe {
        0%,
        100% {
          box-shadow:
            0 0 22px rgba(255, 0, 0, 0.45),
            inset 0 0 22px rgba(255, 0, 0, 0.3);
        }
        50% {
          box-shadow:
            0 0 44px rgba(255, 0, 0, 0.8),
            inset 0 0 34px rgba(255, 0, 0, 0.5);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #suki-splash .suki-splash__ring,
        #suki-splash .suki-splash__logo {
          animation: none !important;
          scale: 1 !important;
          transition: opacity 0.4s ease !important;
        }
        #suki-splash.suki-splash--done .suki-splash__ring,
        #suki-splash.suki-splash--done .suki-splash__logo {
          scale: 1 !important;
        }
      }
    </style>
  </head>
  <body class="text-text antialiased transition-colors duration-200">
    <div id="suki-splash" aria-hidden="true" role="presentation">
      <div class="suki-splash__ring"></div>
      <img class="suki-splash__logo" src="/apple-touch-icon.png" alt="" />
    </div>

    <script>
      // Drives the initial splash defined above. Kept inline + dependency-free so
      // it runs immediately, before the app bundle is fetched or parsed.
      ;(function () {
        var splash = document.getElementById('suki-splash')
        if (!splash) return

        // The splash is only for the app itself, not the marketing landing/login
        // pages. Mirror AppRouter's public-page check: a visitor with no token on
        // a public path renders the landing without ever initializing the DB, so
        // remove the splash before it paints. (Runs synchronously before first
        // paint since this script directly follows the element.)
        var PUBLIC_PATHS = ['/', '/landing', '/login', '/about']
        var hasToken = false
        try {
          hasToken = !!localStorage.getItem('wk_token')
        } catch (e) {}
        if (PUBLIC_PATHS.indexOf(window.location.pathname) !== -1 && !hasToken) {
          if (splash.parentNode) splash.parentNode.removeChild(splash)
          return
        }

        var MIN_VISIBLE_MS = 1100 // let the entry animation finish before we can exit
        var SAFETY_MS = 12000 // never let the splash get stuck if readiness never fires
        var start = Date.now()
        var finished = false

        // Lock scroll + paint dark behind the splash for the duration of the boot.
        document.documentElement.classList.add('suki-booting')

        // Kick off the entry animation once the initial (hidden) state has painted.
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            splash.classList.add('suki-splash--enter')
          })
        })

        function finish() {
          if (finished) return
          finished = true
          var wait = Math.max(0, MIN_VISIBLE_MS - (Date.now() - start))
          window.setTimeout(function () {
            splash.classList.add('suki-splash--done')
            window.setTimeout(function () {
              if (splash.parentNode) splash.parentNode.removeChild(splash)
              // Restore scroll + background now that the app is revealed.
              document.documentElement.classList.remove('suki-booting')
            }, 1000)
          }, wait)
        }

        window.__sukiSplashFinish = finish
        window.setTimeout(finish, SAFETY_MS)
      })()
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
