<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/src/assets/favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="transparent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-title" content="SukiStudy" />
    <link rel="apple-touch-icon" href="/src/assets/apple-touch-icon.png" />
    <title>SukiStudy</title>
    <meta property="description" content="A Japanese learning companion using WaniKani." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sukistudy.vercel.app/" />
    <meta property="og:title" content="SukiStudy" />
    <meta property="og:description" content="A Japanese learning companion using WaniKani." />
    <meta property="og:image" content="https://sukistudy.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://sukistudy.vercel.app/" />
    <meta property="twitter:title" content="SukiStudy" />
    <meta property="twitter:description" content="A Japanese learning companion using WaniKani." />
    <meta property="twitter:image" content="https://sukistudy.vercel.app/og-image.png" />

    <style>
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    <!--
      Initial splash screen. The markup + CSS live here (not React) so they
      paint instantly, before the JS bundle loads; the animation is driven from
      src/utils/splashScreen.ts (initSplash / finishSplash).

      A red ring expands outward from the logo while the app boots. It holds
      until finishSplash() is called (once the databases have initialized), then
      the ring contracts back to nothing: the dark splash is clip-masked to the
      inside of the ring, so as the ring shrinks the app is revealed outside it
      while the logo stays inside until the ring swallows it whole.
    -->
    <style id="suki-splash-style">
      :root {
        --suki-red: #ff0000;
      }

      /* Only applied while the app is booting behind the splash (never on the
         landing/login pages). Locks scroll so no scrollbar exists — a scrollbar
         would shift the centered fixed ring sideways — and paints dark to avoid
         a white flash before the app's dark theme applies. */
      html.suki-booting {
        background-color: #0a0a0c;
      }
      html.suki-booting,
      html.suki-booting body {
        overflow: hidden;
      }

      /* The radius of the ring drives everything: the reveal clip and the ring
         box. Registered so it can be animated (plain custom properties can't).
         --suki-cover is set by the script to the exact distance to a corner so
         the mask fully covers the screen at rest. */
      @property --suki-r {
        syntax: '<length>';
        inherits: true;
        initial-value: 0px;
      }

      #suki-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        overflow: hidden;
        /* Transparent: the mask carries the dark surface, everything outside the
           masked circle shows the app rendering behind. */
        background: transparent;
        --suki-r: 80px;
        --suki-cover: 75vmax;
        transition: --suki-r 1s cubic-bezier(0.22, 1, 0.36, 1);
      }

      /* The dark splash surface + logo, clip-masked to a circle of radius
         --suki-r. Outside the circle is transparent (app shows through). */
      #suki-splash .suki-splash__mask {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 50%, #15151b 0%, #0a0a0c 55%, #060608 100%);
        clip-path: circle(var(--suki-r) at 50% 50%);
      }

      #suki-splash .suki-splash__logo {
        width: 92px;
        height: 92px;
        object-fit: contain;
        border-radius: 22%;
        filter: drop-shadow(0 10px 34px rgba(255, 0, 0, 0.35));
      }

      /* The red ring rides the clip boundary. A sibling of the mask so it isn't
         clipped away. Sized from --suki-r so it always sits on the edge. */
      #suki-splash .suki-splash__ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: calc(var(--suki-r) * 2);
        height: calc(var(--suki-r) * 2);
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 3px solid var(--suki-red);
        box-shadow:
          0 0 26px rgba(255, 0, 0, 0.55),
          inset 0 0 26px rgba(255, 0, 0, 0.35);
        opacity: 0;
        transition: opacity 0.4s ease;
        will-change: width, height;
      }

      /* Entry: expand the ring outward from the logo to cover the screen. */
      #suki-splash.suki-splash--enter {
        --suki-r: var(--suki-cover);
      }
      #suki-splash.suki-splash--enter .suki-splash__ring {
        opacity: 1;
      }

      /* Done: contract to nothing. The mask shrinks with the ring, revealing the
         app from the outside in; the logo stays put until the ring swallows it. */
      #suki-splash.suki-splash--done {
        --suki-r: 0px;
        transition: --suki-r 0.9s cubic-bezier(0.65, 0, 0.35, 1);
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        #suki-splash {
          transition: opacity 0.4s ease;
        }
        #suki-splash .suki-splash__mask {
          clip-path: none;
        }
        #suki-splash .suki-splash__ring {
          display: none;
        }
        #suki-splash.suki-splash--done {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body class="text-text antialiased transition-colors duration-200">
    <div id="suki-splash" aria-hidden="true" role="presentation">
      <div class="suki-splash__mask">
        <img class="suki-splash__logo" src="/apple-touch-icon.png" alt="" />
      </div>
      <div class="suki-splash__ring"></div>
    </div>

    <script>
      // Only the two things that must happen before first paint stay inline; the
      // rest of the splash lifecycle lives in src/utils/splashScreen.ts.
      ;(function () {
        var splash = document.getElementById('suki-splash')
        if (!splash) return

        // The splash is only for the app itself, not the marketing landing/login
        // pages. Mirror AppRouter's public-page check: a visitor with no token on
        // a public path renders the landing, so remove the splash before it
        // paints. Otherwise lock scroll + paint dark behind it for the boot.
        var PUBLIC_PATHS = ['/', '/landing', '/login', '/about']
        var hasToken = false
        try {
          hasToken = !!localStorage.getItem('wk_token')
        } catch (e) {}

        if (PUBLIC_PATHS.indexOf(window.location.pathname) !== -1 && !hasToken) {
          if (splash.parentNode) splash.parentNode.removeChild(splash)
        } else {
          document.documentElement.classList.add('suki-booting')
        }
      })()
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
